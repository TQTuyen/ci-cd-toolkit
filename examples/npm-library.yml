# Example: npm library with simple publish on release
# For a full CD pipeline with version validation, see npm-library-cd.yml

name: CI/CD — npm Library

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

jobs:
  lint:
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-lint.yml@main
    with:
      package-manager: pnpm

  typecheck:
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-typecheck.yml@main
    with:
      package-manager: pnpm

  test:
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-test.yml@main
    with:
      package-manager: pnpm
      coverage: true
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  publish:
    if: github.event_name == 'release'
    needs: [lint, typecheck, test]
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/cd-npm-publish.yml@main
    with:
      package-manager: pnpm
      access: public
      provenance: true
    secrets:
      npm-token: ${{ secrets.NPM_TOKEN }}
