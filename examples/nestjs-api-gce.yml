# Example: NestJS API deployed to GCE instance via GAR + SSH
# Copy this file to your repo's .github/workflows/ directory

name: CI/CD — NestJS API (GCE)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-lint.yml@main
    with:
      package-manager: pnpm

  typecheck:
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-typecheck.yml@main
    with:
      package-manager: pnpm

  test:
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-test.yml@main
    with:
      package-manager: pnpm
      coverage: true
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  push-image:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, typecheck, test]
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/cd-deploy-gar.yml@main
    with:
      repository: my-project/my-repo/my-nestjs-api
      gcp-region: us-central1
    secrets:
      wif-provider: ${{ secrets.GCP_WIF_PROVIDER }}
      service-account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

  deploy:
    needs: [push-image]
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/cd-deploy-gce.yml@main
    with:
      image: ${{ needs.push-image.outputs.image-uri }}
      container-name: my-nestjs-api
      deploy-path: /opt/my-nestjs-api
      docker-run-args: "-p 3000:3000 --network host"
    secrets:
      ssh-host: ${{ secrets.GCE_SSH_HOST }}
      ssh-user: ${{ secrets.GCE_SSH_USER }}
      ssh-key: ${{ secrets.GCE_SSH_KEY }}
      env-file-content: ${{ secrets.APP_ENV_FILE }}
