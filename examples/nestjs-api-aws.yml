# Example: NestJS API deployed to AWS ECR

name: CI/CD — NestJS API (AWS)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-lint.yml@main
    with:
      package-manager: pnpm

  typecheck:
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-typecheck.yml@main
    with:
      package-manager: pnpm

  test:
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/ci-test.yml@main
    with:
      package-manager: pnpm
      coverage: true
    secrets:
      codecov-token: ${{ secrets.CODECOV_TOKEN }}

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [lint, typecheck, test]
    uses: TQTuyen/ci-cd-toolkit/.github/workflows/cd-deploy-ecr.yml@main
    with:
      ecr-repository: my-nestjs-api
      aws-region: us-east-1
    secrets:
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
