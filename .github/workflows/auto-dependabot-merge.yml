name: Auto-merge Dependabot PRs

on:
  workflow_call:
    inputs:
      update-types:
        description: Comma-separated update types to auto-merge (patch, minor, major)
        type: string
        default: "patch,minor"
      concurrency-group:
        description: Concurrency group name
        type: string
        default: ""

concurrency:
  group: ${{ inputs.concurrency-group || format('{0}-dependabot-{1}', github.workflow, github.ref) }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ github.token }}

      - name: Check update type
        id: check
        shell: bash
        run: |
          ALLOWED="${{ inputs.update-types }}"
          UPDATE_TYPE="${{ steps.metadata.outputs.update-type }}"

          if echo "$ALLOWED" | grep -qw "$UPDATE_TYPE"; then
            echo "should-merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "should-merge=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping auto-merge for ${UPDATE_TYPE} update (allowed: ${ALLOWED})"
          fi

      - name: Approve PR
        if: steps.check.outputs.should-merge == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr review --approve "${{ github.event.pull_request.number }}"

      - name: Enable auto-merge
        if: steps.check.outputs.should-merge == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
