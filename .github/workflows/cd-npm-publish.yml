name: CD — npm Publish

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version
        type: string
        default: "20"
      package-manager:
        description: Package manager (pnpm, npm, or bun)
        type: string
        default: pnpm
      working-directory:
        description: Working directory
        type: string
        default: "."
      registry-url:
        description: npm registry URL
        type: string
        default: "https://registry.npmjs.org"
      access:
        description: Package access level (public or restricted)
        type: string
        default: public
      tag:
        description: npm dist-tag (e.g. latest, alpha, beta, rc, next)
        type: string
        default: latest
      provenance:
        description: Publish with provenance attestation
        type: boolean
        default: true
      dry-run:
        description: Perform a dry run without publishing
        type: boolean
        default: false
      artifact-name:
        description: Download pre-built artifact instead of building (leave empty to build)
        type: string
        default: ""
      environment:
        description: GitHub environment for deployment protection rules
        type: string
        default: ""
      concurrency-group:
        description: Concurrency group name
        type: string
        default: ""
    secrets:
      npm-token:
        description: npm authentication token
        required: true

concurrency:
  group: ${{ inputs.concurrency-group || format('{0}-npm-{1}', github.workflow, github.ref) }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: TQTuyen/ci-cd-toolkit/.github/actions/setup-node@main
        with:
          node-version: ${{ inputs.node-version }}
          package-manager: ${{ inputs.package-manager }}
          working-directory: ${{ inputs.working-directory }}

      - name: Configure npm registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: ${{ inputs.registry-url }}

      - name: Download artifact
        if: inputs.artifact-name != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.working-directory }}

      - name: Build
        if: inputs.artifact-name == ''
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        run: |
          case "${{ inputs.package-manager }}" in
            pnpm) pnpm run build ;;
            npm)  npm run build ;;
            bun)  bun run build ;;
          esac

      - name: Publish to npm
        shell: bash
        working-directory: ${{ inputs.working-directory }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm-token }}
        run: |
          PUBLISH_ARGS=("--access" "${{ inputs.access }}")
          PUBLISH_ARGS+=("--tag" "${{ inputs.tag }}")

          if [[ "${{ inputs.provenance }}" == "true" ]]; then
            PUBLISH_ARGS+=("--provenance")
          fi

          if [[ "${{ inputs.dry-run }}" == "true" ]]; then
            PUBLISH_ARGS+=("--dry-run")
          fi

          npm publish "${PUBLISH_ARGS[@]}"
