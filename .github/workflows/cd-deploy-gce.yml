name: CD — Deploy to GCE

on:
  workflow_call:
    inputs:
      image:
        description: Full container image URI (e.g. asia-southeast1-docker.pkg.dev/project/repo/image:tag)
        type: string
        required: true
      container-name:
        description: Name for the running container
        type: string
        required: true
      deploy-path:
        description: Directory on the instance for deployment files (e.g. /opt/app)
        type: string
        required: true
      docker-run-args:
        description: "Additional docker run arguments (e.g. -p 8080:8080 --network host)"
        type: string
        default: ""
      restart-policy:
        description: Docker restart policy
        type: string
        default: unless-stopped
      concurrency-group:
        description: Concurrency group name
        type: string
        default: ""
    secrets:
      ssh-host:
        description: GCE instance external IP or hostname
        required: true
      ssh-user:
        description: SSH username
        required: true
      ssh-key:
        description: SSH private key
        required: true
      env-file-content:
        description: Content for .env file on the instance
        required: false

concurrency:
  group: ${{ inputs.concurrency-group || format('{0}-gce-{1}', github.workflow, github.ref) }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GCE via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_IMAGE: ${{ inputs.image }}
          CONTAINER_NAME: ${{ inputs.container-name }}
          DEPLOY_PATH: ${{ inputs.deploy-path }}
          RESTART_POLICY: ${{ inputs.restart-policy }}
          DOCKER_RUN_ARGS: ${{ inputs.docker-run-args }}
          ENV_FILE_CONTENT: ${{ secrets.env-file-content }}
        with:
          host: ${{ secrets.ssh-host }}
          username: ${{ secrets.ssh-user }}
          key: ${{ secrets.ssh-key }}
          envs: DEPLOY_IMAGE,CONTAINER_NAME,DEPLOY_PATH,RESTART_POLICY,DOCKER_RUN_ARGS,ENV_FILE_CONTENT
          script: |
            set -e
            sudo mkdir -p "$DEPLOY_PATH"
            sudo chown "$(whoami)" "$DEPLOY_PATH"

            # Write .env file if provided
            if [ -n "$ENV_FILE_CONTENT" ]; then
              printf '%s\n' "$ENV_FILE_CONTENT" > "$DEPLOY_PATH/.env"
              chmod 600 "$DEPLOY_PATH/.env"
            fi

            # Authenticate Docker with GAR
            REGISTRY=$(echo "$DEPLOY_IMAGE" | cut -d"/" -f1)
            gcloud auth configure-docker "$REGISTRY" --quiet

            # Pull new image
            docker pull "$DEPLOY_IMAGE"

            # Stop and remove existing container
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true

            # Run new container
            RUN_CMD="docker run -d --name $CONTAINER_NAME --restart $RESTART_POLICY"

            if [ -f "$DEPLOY_PATH/.env" ]; then
              RUN_CMD="$RUN_CMD --env-file $DEPLOY_PATH/.env"
            fi

            if [ -n "$DOCKER_RUN_ARGS" ]; then
              RUN_CMD="$RUN_CMD $DOCKER_RUN_ARGS"
            fi

            RUN_CMD="$RUN_CMD $DEPLOY_IMAGE"
            eval "$RUN_CMD"

            # Cleanup old images
            docker image prune -f
            echo "Deployed $DEPLOY_IMAGE as $CONTAINER_NAME successfully"
