name: Setup AWS
description: Configure AWS credentials via OIDC (preferred) or static access keys

inputs:
  role-to-assume:
    description: IAM role ARN for OIDC authentication (preferred)
    required: false
  aws-access-key-id:
    description: AWS access key ID (fallback to static keys)
    required: false
  aws-secret-access-key:
    description: AWS secret access key (fallback to static keys)
    required: false
  aws-region:
    description: AWS region
    required: false
    default: us-east-1

outputs:
  account-id:
    description: The AWS account ID
    value: ${{ steps.credentials.outputs.aws-account-id }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials
      id: credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.role-to-assume }}
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}
