name: Setup Docker
description: Setup Docker buildx with optional registry login (GHCR, ECR, GAR, DockerHub)

inputs:
  registry:
    description: Container registry to login to (ghcr, ecr, gar, dockerhub, or empty for no login)
    required: false
    default: ""
  ghcr-token:
    description: GitHub token for GHCR login
    required: false
  dockerhub-username:
    description: DockerHub username
    required: false
  dockerhub-token:
    description: DockerHub token/password
    required: false
  aws-region:
    description: AWS region for ECR
    required: false
    default: us-east-1
  gcp-region:
    description: GCP region for Artifact Registry
    required: false
    default: us-central1

outputs:
  registry-url:
    description: The registry URL for pushing images
    value: ${{ steps.registry-url.outputs.url }}

runs:
  using: composite
  steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Determine registry URL
      id: registry-url
      shell: bash
      run: |
        case "${{ inputs.registry }}" in
          ghcr)      echo "url=ghcr.io" >> "$GITHUB_OUTPUT" ;;
          ecr)       echo "url=${{ inputs.aws-region }}.dkr.ecr.amazonaws.com" >> "$GITHUB_OUTPUT" ;;
          gar)       echo "url=${{ inputs.gcp-region }}-docker.pkg.dev" >> "$GITHUB_OUTPUT" ;;
          dockerhub) echo "url=docker.io" >> "$GITHUB_OUTPUT" ;;
          *)         echo "url=" >> "$GITHUB_OUTPUT" ;;
        esac

    - name: Login to GHCR
      if: inputs.registry == 'ghcr'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ inputs.ghcr-token }}

    - name: Login to ECR
      if: inputs.registry == 'ecr'
      uses: aws-actions/amazon-ecr-login@v2

    - name: Login to Google Artifact Registry
      if: inputs.registry == 'gar'
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.gcp-region }}-docker.pkg.dev
        username: oauth2accesstoken
        password: ${{ env.GOOGLE_ACCESS_TOKEN }}

    - name: Login to DockerHub
      if: inputs.registry == 'dockerhub'
      uses: docker/login-action@v3
      with:
        username: ${{ inputs.dockerhub-username }}
        password: ${{ inputs.dockerhub-token }}
